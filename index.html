<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Velion Builder PRO+</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="topbar">
  <button onclick="addElement('text')">Texto</button>
  <button onclick="addElement('button')">Botón</button>
  <button onclick="addElement('panel')">Panel</button>

  <input id="bg-url" placeholder="URL fondo (img o video)">
  <button onclick="setBackground()">Aplicar fondo</button>

  <button onclick="undo()">↶</button>
  <button onclick="redo()">↷</button>
</div>

<div class="app">
  <div id="canvas"></div>

  <div class="panel">
    <h3>Propiedades</h3>

    <input id="prop-text" placeholder="Texto">
    <input id="prop-size" type="number" placeholder="Tamaño">
    <input id="prop-color" type="color">
    <input id="prop-bg" type="color">
    <input id="prop-link" placeholder="Link botón">

    <button onclick="deleteElement()">Eliminar</button>

    <hr>
    <pre id="code"></pre>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
